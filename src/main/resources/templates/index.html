<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝贝成长记录</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;line-height:1.6}
        .container{max-width:1100px;margin:0 auto;padding:20px}
        h1{font-size:1.5rem;color:#2c3e50;margin-bottom:20px;text-align:center}
        .card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:20px;margin-bottom:20px}
        .card h2{font-size:1rem;color:#555;margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:8px}
        .form-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
        .form-group{flex:1;min-width:120px}
        .form-group label{display:block;font-size:.8rem;color:#666;margin-bottom:4px}
        .form-group input,.form-group select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:.9rem}
        .form-group select{background:#fff}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#3498db}
        .btn{padding:8px 20px;border:none;border-radius:4px;cursor:pointer;font-size:.9rem}
        .btn-primary{background:#3498db;color:#fff}
        .btn-danger{background:#e74c3c;color:#fff;padding:4px 10px;font-size:.8rem;border:none;border-radius:4px;cursor:pointer}
        .chart-wrapper{position:relative;height:420px}
        table{width:100%;border-collapse:collapse;font-size:.85rem}
        th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #eee}
        th{background:#f8f9fa;font-weight:600;color:#555}
        tr:hover{background:#f0f7ff}
        .empty-state{text-align:center;color:#999;padding:40px 0}
        .tab-bar,.ctrl-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
        .tab-bar button{padding:6px 16px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:.85rem}
        .tab-bar button.active{background:#3498db;color:#fff;border-color:#3498db}
        .ctrl-bar select{padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:.85rem;background:#fff}
        .note{font-size:.75rem;color:#999;margin-bottom:8px}
        .tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.75rem;margin-left:6px}
        .tag-green{background:#d4edda;color:#155724}
        .tag-blue{background:#d1ecf1;color:#0c5460}
        .tag-orange{background:#fff3cd;color:#856404}
    </style>
</head>
<body>
<div class="container">
    <h1>宝贝成长记录</h1>
    <div style="text-align:center;margin-bottom:15px"><a href="/health" style="color:#27ae60;text-decoration:none;font-size:.9rem">🏥 健康管理 →</a></div>

    <div class="card">
        <h2>添加记录</h2>
        <form th:action="@{/add}" method="post" class="form-row">
            <div class="form-group"><label>日期</label><input type="date" name="recordDate" th:value="${#dates.format(new java.util.Date(), 'yyyy-MM-dd')}" required></div>
            <div class="form-group"><label>身高(cm)</label><input type="number" name="height" step="0.1" required></div>
            <div class="form-group"><label>体重(kg)</label><input type="number" name="weight" step="0.1" required></div>
            <div class="form-group"><label>头围(cm)</label><input type="number" name="headCircumference" step="0.1"></div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>

    <div class="card">
        <h2>成长曲线</h2>
        <div class="ctrl-bar">
            <select id="standardSelect" onchange="onStandardChange()">
                <option value="CN_2022">卫健委 WS/T 423-2022</option>
                <option value="WHO_2006">WHO 2006 (国际标准)</option>
            </select>
            <select id="genderSelect" onchange="onStandardChange()">
                <option value="FEMALE">女孩</option>
                <option value="MALE">男孩</option>
            </select>
            <span id="standardNote" class="note"></span>
        </div>
        <div class="tab-bar">
            <button class="active" onclick="switchChart('height')">身高</button>
            <button onclick="switchChart('weight')">体重</button>
            <button onclick="switchChart('head')">头围</button>
        </div>
        <div class="ctrl-bar">
            <label>预测月数：<input type="number" id="predictMonths" value="12" min="1" max="36" style="width:60px;padding:4px;border:1px solid #ddd;border-radius:4px"></label>
            <button onclick="refreshPrediction()" style="padding:4px 12px;background:#3498db;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.8rem">更新预测</button>
        </div>
        <div class="chart-wrapper"><canvas id="growthChart"></canvas></div>
    </div>

    <div class="card">
        <h2>历史记录 <span style="font-size:.75rem;font-weight:normal;color:#999" id="recordCount"></span></h2>
        <div style="overflow-x:auto">
        <table>
            <thead><tr><th>日期</th><th>月龄</th><th>身高(cm)</th><th>体重(kg)</th><th>头围(cm)</th><th>百分位</th><th>操作</th></tr></thead>
            <tbody id="recordBody">
                <tr th:each="r : ${records}">
                    <td class="rdate" th:text="${r.recordDate}">-</td>
                    <td class="rage" th:text="${r.notes} ?: '-'">-</td>
                    <td class="rheight" th:text="${r.height}">-</td>
                    <td class="rweight" th:text="${r.weight}">-</td>
                    <td class="rhead" th:text="${r.headCircumference} ?: '-'">-</td>
                    <td class="rpct">-</td>
                    <td><form th:action="@{/delete/{id}(id=${r.id})}" method="post" style="display:inline"><button type="submit" class="btn-danger" onclick="return confirm('确定删除？')">删除</button></form></td>
                </tr>
                <tr th:if="${#lists.isEmpty(records)}"><td colspan="7" class="empty-state">还没有记录</td></tr>
            </tbody>
        </table>
        </div>
    </div>
</div>

<script>
// === 数据提取 ===
function parseRecords() {
    var rows = document.querySelectorAll('table tbody tr');
    var result = [];
    for (var i = 0; i < rows.length; i++) {
        var tds = rows[i].querySelectorAll('td');
        if (tds.length < 7) continue;
        var dateTxt = tds[0].textContent.trim();
        var heightTxt = tds[2].textContent.trim();
        var weightTxt = tds[3].textContent.trim();
        var headTxt = tds[4].textContent.trim();
        if (dateTxt === '-' || heightTxt === '-') continue;
        result.push({
            recordDate: dateTxt,
            height: parseFloat(heightTxt),
            weight: parseFloat(weightTxt),
            headCircumference: headTxt === '-' ? null : parseFloat(headTxt)
        });
    }
    return result;
}

var records = parseRecords();
console.log('Parsed records:', records.length);

// 出生日期（取最早记录）
var birthDate = null;
if (records.length > 0) {
    var sorted = records.slice().sort(function(a,b){return new Date(a.recordDate)-new Date(b.recordDate);});
    birthDate = new Date(sorted[0].recordDate);
}

function calcMonthAge(dateStr) {
    if (!birthDate) return NaN;
    var d = new Date(dateStr);
    return (d.getFullYear() - birthDate.getFullYear()) * 12 + (d.getMonth() - birthDate.getMonth());
}

var chart = null, curView = 'height';

// === 标准相关 ===
function currentStandard() { return document.getElementById('standardSelect').value; }
function currentGender() { return document.getElementById('genderSelect').value; }

function standardLabel(s) {
    return s === 'CN_2022' ? '卫健委 WS/T 423-2022' : 'WHO 2006 (国际标准)';
}

async function loadStandardsData() {
    var s = currentStandard();
    var g = currentGender();
    try {
        var resp = await fetch('/api/standards?standard=' + s + '&gender=' + g);
        if (!resp.ok) return null;
        var data = await resp.json();
        document.getElementById('standardNote').textContent = '数据源：' + (data.note || standardLabel(s));
        return data;
    } catch(e) { console.error('Load standards error:', e); return null; }
}

// === 百分位计算 ===
async function calcPercentile(indicator, value, ageMonths) {
    var s = currentStandard();
    var g = currentGender();
    try {
        var resp = await fetch('/api/standards/percentile?standard=' + s + '&gender=' + g + '&indicator=' + indicator + '&value=' + value + '&ageMonths=' + ageMonths);
        if (!resp.ok) return null;
        return await resp.json();
    } catch(e) { return null; }
}

// 更新表格百分位列
function updatePercentiles() {
    var rows = document.querySelectorAll('#recordBody tr');
    for (var i = 0; i < rows.length; i++) {
        var tds = rows[i].querySelectorAll('td');
        if (tds.length < 7) continue;
        var dateTxt = tds[0].textContent.trim();
        var heightTxt = tds[2].textContent.trim();
        var weightTxt = tds[3].textContent.trim();
        var headTxt = tds[4].textContent.trim();
        var pctCell = tds[5];
        if (!pctCell || dateTxt === '-' || heightTxt === '-') continue;

        var age = calcMonthAge(dateTxt);
        if (isNaN(age)) continue;

        var parts = [];
        if (heightTxt !== '-') parts.push('H:' + parseFloat(heightTxt).toFixed(1));
        if (weightTxt !== '-') parts.push('W:' + parseFloat(weightTxt).toFixed(1));
        if (headTxt && headTxt !== '-') parts.push('C:' + parseFloat(headTxt).toFixed(1));
        pctCell.textContent = parts.join(' | ');
        pctCell.style.fontSize = '.75rem';
    }
}

// === 图表演示 ===
async function renderChart(view) {
    var ctx = document.getElementById('growthChart').getContext('2d');
    if (chart) chart.destroy();
    curView = view;

    var fields = {height:'height', weight:'weight', head:'headCircumference'};
    var field = fields[view];
    var label = view==='height'?'身高(cm)':view==='weight'?'体重(kg)':'头围(cm)';

    var standardsData = await loadStandardsData();
    if (!standardsData || !standardsData[field]) { return; }

    var s = standardsData[field];
    var d3 = s.map(function(p){return {x:p.monthAge, y:p.p3};});
    var d50 = s.map(function(p){return {x:p.monthAge, y:p.p50};});
    var d97 = s.map(function(p){return {x:p.monthAge, y:p.p97};});

    var child = [];
    for (var i = 0; i < records.length; i++) {
        var a = calcMonthAge(records[i].recordDate);
        var v = records[i][field];
        if (v != null && !isNaN(a)) child.push({x:a, y:v});
    }
    child.sort(function(a,b){return a.x-b.x;});

    // 获取预测数据
    var pm = parseInt(document.getElementById('predictMonths').value) || 12;
    var predResp, pp = [];
    try { predResp = await fetch('/api/standards/prediction?monthsAhead=' + pm); if (predResp.ok) { var pd = await predResp.json(); if (pd[field] && pd[field].predicted) pp = pd[field].predicted.map(function(p){return {x:p.monthAge,y:p.value};}); } } catch(e) {}

    var ds = [
        {label:'P97 上限', data:d97, borderColor:'rgba(231,76,60,0.3)', borderDash:[4,4], pointRadius:0, tension:0.3, fill:false},
        {label:'P50 中位数', data:d50, borderColor:'rgba(46,204,113,0.5)', borderDash:[4,4], pointRadius:0, tension:0.3, fill:'-1'},
        {label:'P3 下限', data:d3, borderColor:'rgba(52,152,219,0.3)', borderDash:[4,4], pointRadius:0, tension:0.3, fill:'-1'}
    ];
    if (child.length > 0) ds.push({label:'宝宝 '+label, data:child, borderColor:'#e74c3c', backgroundColor:'rgba(231,76,60,0.15)', pointBackgroundColor:'#e74c3c', pointRadius:5, tension:0.3, fill:false, borderWidth:2.5});
    if (pp.length > 0) ds.push({label:'预测趋势', data:pp, borderColor:'#9b59b6', borderDash:[8,4], pointRadius:4, pointStyle:'rectRot', tension:0.3, fill:false, borderWidth:2});

    var maxX = 72;
    if (child.length > 0) maxX = Math.max(maxX, child[child.length-1].x + 12);
    if (pp.length > 0) maxX = Math.max(maxX, pp[pp.length-1].x);

    chart = new Chart(ctx, {
        type:'line', data:{datasets:ds},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{position:'top', labels:{usePointStyle:true, padding:15, font:{size:11}}}},
            scales:{
                x:{type:'linear', title:{display:true, text:'月龄', font:{size:12}}, ticks:{maxTicksLimit:18, callback:function(v){return v+'个月';}}, min:0, max:Math.max(maxX, 36)},
                y:{title:{display:true, text:label, font:{size:12}}, beginAtZero:false}
            }
        }
    });
}

function switchChart(v) {
    document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.remove('active');});
    event.target.classList.add('active');
    renderChart(v);
}

async function onStandardChange() {
    await Promise.all([renderChart(curView), updatePercentiles()]);
}

async function refreshPrediction() {
    renderChart(curView);
}

// === 页面加载 ===
updatePercentiles();
renderChart('height');
</script>
</body>
</html>
