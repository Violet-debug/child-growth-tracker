<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就医记录</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;line-height:1.6}
        .container{max-width:900px;margin:0 auto;padding:20px}
        h1{font-size:1.4rem;color:#2c3e50;margin-bottom:15px;text-align:center}
        .nav{margin-bottom:15px;text-align:center}
        .nav a{color:#3498db;text-decoration:none;font-size:.85rem;margin:0 8px}
        .nav a:hover{text-decoration:underline}
        .card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:20px;margin-bottom:20px}
        .card h2{font-size:1rem;color:#555;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px}
        .form-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
        .form-group{flex:1;min-width:120px}
        .form-group label{display:block;font-size:.8rem;color:#666;margin-bottom:3px}
        .form-group input{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:4px;font-size:.9rem}
        .form-group input:focus{outline:none;border-color:#3498db}
        .btn{padding:7px 16px;border:none;border-radius:4px;cursor:pointer;font-size:.85rem}
        .btn-primary{background:#3498db;color:#fff}
        .btn-danger{background:#e74c3c;color:#fff;padding:3px 8px;font-size:.75rem;border:none;border-radius:3px;cursor:pointer}
        .sick-item{padding:12px 0;border-bottom:1px solid #f0f0f0}
        .sick-item:last-child{border-bottom:none}
        .sick-date{font-size:.78rem;color:#999}
        .sick-title{font-weight:600;color:#2c3e50;margin:4px 0}
        .sick-title a{color:#2c3e50;text-decoration:none}
        .sick-title a:hover{color:#3498db}
        .sick-desc{font-size:.82rem;color:#666}
        .sick-status{float:right}
        .badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:.72rem}
        .badge-active{background:#fff3f0;color:#e74c3c;border:1px solid #e74c3c}
        .badge-done{background:#f0faf5;color:#27ae60;border:1px solid #27ae60}
        .empty{text-align:center;color:#999;padding:30px 0}
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/health">← 健康管理</a>
        <a href="/health/supplements">补给记录 →</a>
    </div>
    <h1>🏥 就医记录</h1>

    <div class="card">
        <h2>新增记录</h2>
        <form th:action="@{/health/sickness/add}" method="post" class="form-row">
            <div class="form-group"><label>发病日期</label><input type="date" name="startDate" th:value="${#dates.format(new java.util.Date(), 'yyyy-MM-dd')}"></div>
            <div class="form-group" style="flex:2"><label>症状</label><input type="text" name="symptoms" placeholder="如 发烧38.5°C、咳嗽" required></div>
            <div class="form-group"><label>就诊医院</label><input type="text" name="hospital" placeholder="选填"></div>
            <button type="submit" class="btn btn-primary">记录</button>
        </form>
    </div>

    <div class="card">
        <h2>历史记录</h2>
        <div th:if="${#lists.isEmpty(sicknessList)}" class="empty">还没有就医记录</div>
        <div th:each="s : ${sicknessList}" class="sick-item">
            <div class="sick-status">
                <span th:if="${s.endDate == null}" class="badge badge-active">治疗中</span>
                <span th:unless="${s.endDate == null}" class="badge badge-done">已痊愈</span>
            </div>
            <div class="sick-date" th:text="${s.startDate}">-</div>
            <div class="sick-title"><a th:href="@{/health/sickness/{id}(id=${s.id})}" th:text="${s.symptoms}">症状</a></div>
            <div class="sick-desc" th:if="${s.diagnosis}" th:text="'诊断: ' + ${s.diagnosis}"></div>
            <div class="sick-desc" th:if="${s.hospital}" th:text="'🏥 ' + ${s.hospital}"></div>
            <form th:action="@{/health/sickness/{id}/delete(id=${s.id})}" method="post" style="margin-top:4px">
                <button type="submit" class="btn-danger" onclick="return confirm('确定删除？')">删除</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
