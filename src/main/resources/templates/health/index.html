<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管理</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;line-height:1.6}
        .container{max-width:600px;margin:0 auto;padding:40px 20px;text-align:center}
        h1{font-size:1.5rem;color:#2c3e50;margin-bottom:30px}
        .nav-links{display:flex;flex-direction:column;gap:15px}
        .nav-link{display:block;padding:25px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-decoration:none;transition:box-shadow .2s}
        .nav-link:hover{box-shadow:0 3px 8px rgba(0,0,0,.15)}
        .nav-link .title{font-size:1.1rem;font-weight:600;color:#2c3e50}
        .nav-link .desc{font-size:.85rem;color:#888;margin-top:5px}
        .nav-link .icon{font-size:2rem;margin-bottom:8px}
        .back{margin-top:30px;display:inline-block;color:#3498db;text-decoration:none;font-size:.9rem}
        .back:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 健康管理</h1>
    <div class="nav-links">
        <a href="/health/supplements" class="nav-link">
            <div class="icon">💊</div>
            <div class="title">补给记录</div>
            <div class="desc">记录每日吃的钙、铁、维生素D等补给</div>
        </a>
        <a href="/health/sickness" class="nav-link">
            <div class="icon">🏥</div>
            <div class="title">就医记录</div>
            <div class="desc">记录生病症状、医生诊断、用药详情</div>
        </a>
    </div>
    <a href="/" class="back">← 返回成长记录</a>
</div>
</body>
</html>
